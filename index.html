```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Minetrials of Caves and Crafts</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial,sans-serif;
}

#menu{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:#111;
    color:white;
    z-index:20;
}

button{
    padding:10px 25px;
    margin:10px;
    font-size:20px;
    cursor:pointer;
}

#game{
    position:absolute;
    top:0;
    left:0;
}

#mapScreen{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:none;
    z-index:10;
}
</style>
</head>
<body>

<div id="menu">
    <h1>Choose Your Gender</h1>
    <button onclick="startGame('male')">Male</button>
    <button onclick="startGame('female')">Female</button>
</div>

<canvas id="game"></canvas>
<canvas id="mapScreen"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const mapCanvas = document.getElementById("mapScreen");
const mapCtx = mapCanvas.getContext("2d");

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    mapCanvas.width = window.innerWidth;
    mapCanvas.height = window.innerHeight;
}

resizeCanvas();

window.addEventListener("resize", resizeCanvas);

let gameStarted = false;
let showMap = false;

const player = {
    x: 500,
    y: 300,
    size: 30,
    color: "blue",
    speed: 4
};

const village = {
    x: 900,
    y: 300,
    width: 120,
    height: 100
};

const inventory = [
    "Map",
    "",
    "",
    "",
    "",
    "",
    "",
    "",
    "",
    ""
];

const keys = {};

function startGame(gender){
    document.getElementById("menu").style.display = "none";

    if(gender === "male"){
        player.color = "#3498db";
    }else{
        player.color = "#ff69b4";
    }

    gameStarted = true;
    gameLoop();
}

document.addEventListener("keydown", e=>{
    const key = e.key.toLowerCase();
    keys[key] = true;

    if(key === "m"){
        showMap = !showMap;
        mapCanvas.style.display = showMap ? "block" : "none";

        if(showMap){
            drawMap();
        }
    }

    if(key === "e"){
        const nearVillage =
            player.x > village.x - 50 &&
            player.x < village.x + village.width + 50 &&
            player.y > village.y - 50 &&
            player.y < village.y + village.height + 50;

        if(nearVillage){
            alert("Welcome to the Village!");
        }
    }
});

document.addEventListener("keyup", e=>{
    keys[e.key.toLowerCase()] = false;
});

function movePlayer(){

    if(showMap) return;

    if(keys["w"]) player.y -= player.speed;
    if(keys["s"]) player.y += player.speed;
    if(keys["a"]) player.x -= player.speed;
    if(keys["d"]) player.x += player.speed;

    player.x = Math.max(
    60,
    Math.min(canvas.width - 60, player.x)
);

player.y = Math.max(
    60,
    Math.min(canvas.height - 60, player.y)
);
}

function drawForest(){

    // Grass
    ctx.fillStyle = "#2d6a2d";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // Mountains
    ctx.fillStyle = "#777";

    for(let x=0;x<canvas.width;x+=50){

        // Top
        ctx.beginPath();
        ctx.moveTo(x,50);
        ctx.lineTo(x+25,0);
        ctx.lineTo(x+50,50);
        ctx.fill();

        // Bottom
        ctx.beginPath();
        ctx.moveTo(x,canvas.height-50);
        ctx.lineTo(x+25,canvas.height);
        ctx.lineTo(x+50,canvas.height-50);
        ctx.fill();
    }

    for(let y=0;y<canvas.height;y+=50){

        // Left
        ctx.beginPath();
        ctx.moveTo(50,y);
        ctx.lineTo(0,y+25);
        ctx.lineTo(50,y+50);
        ctx.fill();

        // Right
        ctx.beginPath();
        ctx.moveTo(canvas.width-50,y);
        ctx.lineTo(canvas.width,y+25);
        ctx.lineTo(canvas.width-50,y+50);
        ctx.fill();
    }

    // Trees
    for(let x=80;x<canvas.width;x+=80){
        for(let y=80;y<canvas.height;y+=80){

            ctx.fillStyle = "#5c3b1e";
            ctx.fillRect(x+15,y+20,10,20);

            ctx.fillStyle = "#1f4d1f";
            ctx.beginPath();
            ctx.arc(x+20,y+15,18,0,Math.PI*2);
            ctx.fill();
        }
    }
}

function drawVillage(){

    ctx.fillStyle = "#c2a878";
    ctx.fillRect(
        village.x,
        village.y,
        village.width,
        village.height
    );

    ctx.fillStyle = "#8b4513";

    for(let i=0;i<3;i++){
        ctx.fillRect(
            village.x + 15 + (i * 35),
            village.y + 20,
            25,
            25
        );
    }

    ctx.fillStyle = "white";
    ctx.font = "18px Arial";
    ctx.fillText(
        "Village",
        village.x + 20,
        village.y - 10
    );
}

function drawPlayer(){
    ctx.fillStyle = player.color;

    ctx.beginPath();
    ctx.arc(
        player.x,
        player.y,
        player.size/2,
        0,
        Math.PI*2
    );
    ctx.fill();
}

function drawInventory(){

    const slots = 10;
    const size = 60;
    const spacing = 8;

    const totalWidth = slots * (size + spacing);
    const startX = (canvas.width - totalWidth) / 2;
    const y = canvas.height - 90;

    for(let i=0;i<slots;i++){

        ctx.fillStyle = "#444";
        ctx.fillRect(
            startX + i*(size+spacing),
            y,
            size,
            size
        );

        ctx.strokeStyle = "white";
        ctx.strokeRect(
            startX + i*(size+spacing),
            y,
            size,
            size
        );

        if(inventory[i]){
            ctx.fillStyle = "white";
            ctx.font = "12px Arial";

            ctx.fillText(
                inventory[i],
                startX + i*(size+spacing) + 8,
                y + 35
            );
        }
    }

    ctx.fillStyle = "white";
    ctx.font = "18px Arial";
    ctx.fillText("WASD = Move",20,30);
    ctx.fillText("M = Map",20,55);
    ctx.fillText("E = Interact",20,80);
}

function drawMap(){

    mapCtx.clearRect(0,0,mapCanvas.width,mapCanvas.height);

    // Sky
    mapCtx.fillStyle = "#87ceeb";
    mapCtx.fillRect(0,0,mapCanvas.width,mapCanvas.height);

    // Forest land
    mapCtx.fillStyle = "#0f5f0f";
    mapCtx.fillRect(
        80,
        80,
        mapCanvas.width - 160,
        mapCanvas.height - 160
    );

    // Mountains around edge
    mapCtx.fillStyle = "#777";

    // Top
    for(let x=0;x<mapCanvas.width;x+=40){
        mapCtx.beginPath();
        mapCtx.moveTo(x,70);
        mapCtx.lineTo(x+20,10);
        mapCtx.lineTo(x+40,70);
        mapCtx.fill();
    }

    // Bottom
    for(let x=0;x<mapCanvas.width;x+=40){
        mapCtx.beginPath();
        mapCtx.moveTo(x,mapCanvas.height-70);
        mapCtx.lineTo(x+20,mapCanvas.height-130);
        mapCtx.lineTo(x+40,mapCanvas.height-70);
        mapCtx.fill();
    }

    // Left
    for(let y=0;y<mapCanvas.height;y+=40){
        mapCtx.beginPath();
        mapCtx.moveTo(70,y);
        mapCtx.lineTo(10,y+20);
        mapCtx.lineTo(70,y+40);
        mapCtx.fill();
    }

    // Right
    for(let y=0;y<mapCanvas.height;y+=40){
        mapCtx.beginPath();
        mapCtx.moveTo(mapCanvas.width-70,y);
        mapCtx.lineTo(mapCanvas.width-10,y+20);
        mapCtx.lineTo(mapCanvas.width-70,y+40);
        mapCtx.fill();
    }

    // Trees on map
    for(let x=120;x<mapCanvas.width-120;x+=90){
        for(let y=120;y<mapCanvas.height-120;y+=90){

            mapCtx.fillStyle = "#5c3b1e";
            mapCtx.fillRect(x-4,y,8,14);

            mapCtx.fillStyle = "#145214";
            mapCtx.beginPath();
            mapCtx.arc(x,y,12,0,Math.PI*2);
            mapCtx.fill();
        }
    }

    // Village
    const villageX = mapCanvas.width - 220;
    const villageY = mapCanvas.height / 2 - 80;

    mapCtx.fillStyle = "#c2a878";
    mapCtx.fillRect(
        villageX,
        villageY,
        140,
        100
    );

    mapCtx.fillStyle = "#8b4513";

    for(let i=0;i<3;i++){
        mapCtx.fillRect(
            villageX + 15 + i*40,
            villageY + 20,
            25,
            25
        );
    }

    mapCtx.fillStyle = "white";
    mapCtx.font = "28px Arial";
    mapCtx.fillText(
        "Village",
        villageX - 10,
        villageY - 20
    );

    // Player position
    const px =
        80 +
        (player.x / canvas.width) *
        (mapCanvas.width - 160);

    const py =
        80 +
        (player.y / canvas.height) *
        (mapCanvas.height - 160);

    mapCtx.fillStyle = "red";
    mapCtx.beginPath();
    mapCtx.arc(px, py, 8, 0, Math.PI * 2);
    mapCtx.fill();

    mapCtx.fillStyle = "white";
    mapCtx.font = "30px Arial";
    mapCtx.fillText("MAP",30,50);
}

function gameLoop(){

    if(!gameStarted) return;

    movePlayer();

    drawForest();
    drawVillage();
    drawPlayer();
    drawInventory();

    if(showMap){
        drawMap();
    }

    requestAnimationFrame(gameLoop);
}
</script>

</body>
</html>
```
