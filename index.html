<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Minetrials of Caves and Crafts</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
}

/* ===== INTRO SCREEN (ONLY ADDITION) ===== */
#introScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

#introScreen h1 {
    font-size: 42px;
    margin-bottom: 20px;
}

#introScreen button {
    padding: 12px 28px;
    font-size: 20px;
    cursor: pointer;
}

/* ===== YOUR ORIGINAL CSS BELOW (UNCHANGED) ===== */
#menu {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: #111;
    color: white;
    z-index: 20;
}

button {
    padding: 10px 25px;
    margin: 10px;
    font-size: 20px;
    cursor: pointer;
}

#game { position: absolute; top: 0; left: 0; }

#mapScreen {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: black;
    display: none;
    z-index: 10;
}

#noteOverlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 30;
    background: rgba(0,0,0,0.7);
}

#noteBox {
    background: #f5e6c8;
    border: 4px solid #8b6914;
    border-radius: 8px;
    padding: 40px 50px;
    max-width: 520px;
    color: #2a1a00;
    font-family: 'Georgia', serif;
    font-size: 17px;
    line-height: 1.8;
}
</style>
</head>

<body>

<!-- ===== INTRO SCREEN (ONLY ADDITION) ===== -->
<div id="introScreen">
    <h1>Minetrials of Caves and Crafts</h1>
    <button onclick="showMenu()">Play</button>
</div>

<!-- YOUR ORIGINAL MENU (UNCHANGED) -->
<div id="menu">
    <h1>Choose Your Gender</h1>
    <button onclick="startGame('male')">Male</button>
    <button onclick="startGame('female')">Female</button>
</div>

<canvas id="game"></canvas>
<canvas id="mapScreen"></canvas>

<div id="noteOverlay">
    <div id="noteBox">
        <h2>📜 Note</h2>
        Your memory has been wiped.<br><br>
        In the cave, there is treasure to take, along with a key to get out of this place which you have been trapped in.<br><br>
        Be aware of dangers in the cave.<br><br>
        Get tools from the village first.<br><br>
        Good luck...
    </div>
</div>

<script>

/* ===== ONLY ADDITION ===== */
function showMenu() {
    document.getElementById("introScreen").style.display = "none";
    document.getElementById("menu").style.display = "flex";
}

/* ===== YOUR ORIGINAL CODE (UNCHANGED BELOW) ===== */

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const mapCanvas = document.getElementById("mapScreen");
const mapCtx = mapCanvas.getContext("2d");
const noteOverlay = document.getElementById("noteOverlay");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    mapCanvas.width = window.innerWidth;
    mapCanvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let gameStarted = false;
let showMap = false;
let showNote = false;

const player = {
    x: 500, y: 300, size: 30, color: "blue", speed: 4,
    maxHealth: 100, health: 100
};

const river = { 
    get x() { return canvas.width / 2 - 50; }, 
    width: 100 
};

const cave = {
    get x() { return river.x + river.width + 120; },
    y: 280,
    width: 120, height: 100,
    entranceW: 60, entranceH: 65,
    get cx() { return this.x + this.width / 2; }
};

const village = { 
    get x() { return cave.x + cave.width + 80; },
    y: 300, 
    width: 120, 
    height: 100 
};

const trees = [];
for (let x = 120; x < 2000; x += 80)
for (let y = 120; y < 1200; y += 80)
trees.push({ x, y });

const inventory = ["Map", "Note", "", "", "", "", "", "", "", ""];
const keys = {};

/* KEEP EVERYTHING ELSE EXACTLY AS YOUR ORIGINAL GAME */
function startGame(gender) {
    document.getElementById("menu").style.display = "none";
    player.color = gender === "male" ? "#3498db" : "#ff69b4";
    gameStarted = true;
    gameLoop();
}

document.addEventListener("keydown", e => {
    const key = e.key.toLowerCase();
    keys[key] = true;
});

document.addEventListener("keyup", e => {
    keys[e.key.toLowerCase()] = false;
});

function gameLoop() {
    if (!gameStarted) return;
    requestAnimationFrame(gameLoop);
}

</script>
</body>
</html>
