<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Minetrials of Caves and Crafts</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
}

/* INTRO SCREEN */
#introScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 100;
}

#introScreen h1 {
    font-size: 40px;
    margin-bottom: 20px;
}

#introScreen button {
    padding: 12px 30px;
    font-size: 20px;
    cursor: pointer;
}

/* GENDER MENU */
#menu {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: #111;
    color: white;
    z-index: 20;
}

button {
    padding: 10px 25px;
    margin: 10px;
    font-size: 20px;
    cursor: pointer;
}

#game { position: absolute; top: 0; left: 0; }

#mapScreen {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: black;
    display: none;
    z-index: 10;
}

#noteOverlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 30;
    background: rgba(0,0,0,0.7);
}

#noteBox {
    background: #f5e6c8;
    border: 4px solid #8b6914;
    border-radius: 8px;
    padding: 40px 50px;
    max-width: 520px;
    color: #2a1a00;
    font-family: 'Georgia', serif;
    font-size: 17px;
    line-height: 1.8;
    box-shadow: 0 0 40px rgba(0,0,0,0.8);
    position: relative;
}
</style>
</head>

<body>

<!-- INTRO SCREEN -->
<div id="introScreen">
    <h1>Minetrials of Caves and Crafts</h1>
    <button onclick="showMenu()">Play</button>
</div>

<!-- GENDER MENU -->
<div id="menu">
    <h1>Choose Your Gender</h1>
    <button onclick="startGame('male')">Male</button>
    <button onclick="startGame('female')">Female</button>
</div>

<canvas id="game"></canvas>
<canvas id="mapScreen"></canvas>

<div id="noteOverlay">
    <div id="noteBox">
        <h2>📜 Note</h2>
        Your memory has been wiped.<br><br>
        In the cave, there is treasure to take, along with a key to get out of this place you are trapped in.<br><br>
        Be careful in the cave.<br><br>
        Get tools from the village before going in.<br><br>
        Good luck...
    </div>
</div>

<script>

/* INTRO FUNCTIONS */
function showMenu() {
    document.getElementById("introScreen").style.display = "none";
    document.getElementById("menu").style.display = "flex";
}

/* GAME START */
function startGame(gender) {
    document.getElementById("menu").style.display = "none";
    player.color = gender === "male" ? "#3498db" : "#ff69b4";
    gameStarted = true;
    gameLoop();
}

/* CANVAS SETUP */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const mapCanvas = document.getElementById("mapScreen");
const mapCtx = mapCanvas.getContext("2d");
const noteOverlay = document.getElementById("noteOverlay");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    mapCanvas.width = window.innerWidth;
    mapCanvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let gameStarted = false;
let showMap = false;
let showNote = false;

const player = {
    x: 500, y: 300, size: 30, color: "blue", speed: 4,
    maxHealth: 100, health: 100
};

const river = { 
    get x() { return canvas.width / 2 - 50; }, 
    width: 100 
};

const cave = {
    get x() { return river.x + river.width + 120; },
    y: 280,
    width: 120, height: 100,
    entranceW: 60, entranceH: 65,
    get cx() { return this.x + this.width / 2; }
};

const village = { 
    get x() { return cave.x + cave.width + 80; },
    y: 300, 
    width: 120, 
    height: 100 
};

const trees = [];
for (let x = 120; x < 2000; x += 80)
for (let y = 120; y < 1200; y += 80)
trees.push({ x, y });

const inventory = ["Map", "Note", "", "", "", "", "", "", "", ""];
const keys = {};

/* INPUT */
document.addEventListener("keydown", e => {
    const key = e.key.toLowerCase();
    keys[key] = true;

    if (key === "m" && !showNote) {
        showMap = !showMap;
        mapCanvas.style.display = showMap ? "block" : "none";
        if (showMap) drawMap();
    }

    if (key === "n") {
        showNote = !showNote;
        noteOverlay.style.display = showNote ? "flex" : "none";
        if (showNote) showMap = false;
        mapCanvas.style.display = "none";
    }

    if (key === "e" && !showNote && !showMap) {
        const nearVillage =
            player.x > village.x - 50 && player.x < village.x + village.width + 50 &&
            player.y > village.y - 50 && player.y < village.y + village.height + 50;

        const nearCave =
            player.x > cave.x - 50 && player.x < cave.x + cave.width + 50 &&
            player.y > cave.y - 50 && player.y < cave.y + cave.height + 50;

        if (nearVillage) alert("Welcome to the Village!");
        else if (nearCave) alert("A dark cave looms before you...");
    }
});

document.addEventListener("keyup", e => {
    keys[e.key.toLowerCase()] = false;
});

/* MOVEMENT */
function movePlayer() {
    if (showMap || showNote) return;

    if (keys["w"]) player.y -= player.speed;
    if (keys["s"]) player.y += player.speed;
    if (keys["a"]) player.x -= player.speed;
    if (keys["d"]) player.x += player.speed;

    player.x = Math.max(70, Math.min(canvas.width - 70, player.x));
    player.y = Math.max(70, Math.min(canvas.height - 70, player.y));
}

/* DRAW WORLD */
function drawForest() {
    ctx.fillStyle = "#2d6a2d";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#3498db";
    ctx.fillRect(river.x, 0, river.width, canvas.height);

    drawMountains(ctx, canvas.width, canvas.height);

    for (const tree of trees) {
        ctx.fillStyle = "#5c3b1e";
        ctx.fillRect(tree.x-5, tree.y, 10, 20);
        ctx.fillStyle = "#145214";
        ctx.beginPath();
        ctx.arc(tree.x, tree.y-5, 18, 0, Math.PI*2);
        ctx.fill();
    }
}

function drawCave() {
    const { x, y, width, height, entranceW, entranceH, cx } = cave;

    ctx.fillStyle = "#4a4a4a";
    ctx.beginPath();
    ctx.moveTo(x-10, y+height);
    ctx.bezierCurveTo(x-10, y+10, x+10, y-20, cx, y-30);
    ctx.bezierCurveTo(x+width-10, y-20, x+width+10, y+10, x+width+10, y+height);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "black";
    ctx.beginPath();
    ctx.ellipse(cx, y+height-10, entranceW/2, entranceH/2, 0, 0, Math.PI*2);
    ctx.fill();
}

function drawVillage() {
    ctx.fillStyle = "#c2a878";
    ctx.fillRect(village.x, village.y, village.width, village.height);

    ctx.fillStyle = "white";
    ctx.font = "18px Arial";
    ctx.fillText("Village", village.x, village.y - 10);
}

function drawPlayer() {
    ctx.fillStyle = player.color;
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.size/2, 0, Math.PI*2);
    ctx.fill();
}

function drawMap() {
    mapCtx.clearRect(0, 0, mapCanvas.width, mapCanvas.height);
    mapCtx.fillStyle = "green";
    mapCtx.fillRect(0, 0, mapCanvas.width, mapCanvas.height);
}

/* GAME LOOP */
function gameLoop() {
    if (!gameStarted) return;

    movePlayer();
    drawForest();
    drawCave();
    drawVillage();
    drawPlayer();

    if (showMap) drawMap();

    requestAnimationFrame(gameLoop);
}

</script>
</body>
</html>
