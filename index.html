<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Minetrials of Caves and Crafts</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
}

#menu {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: #111;
    color: white;
    z-index: 20;
}

button {
    padding: 10px 25px;
    margin: 10px;
    font-size: 20px;
    cursor: pointer;
}

#game {
    position: absolute;
    top: 0;
    left: 0;
}

#mapScreen {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    display: none;
    z-index: 10;
}

#noteOverlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 30;
    background: rgba(0,0,0,0.7);
}
</style>
</head>

<body>

<div id="menu">
    <h1>Choose Your Gender</h1>
    <button onclick="startGame('male')">Male</button>
    <button onclick="startGame('female')">Female</button>
</div>

<canvas id="game"></canvas>
<canvas id="mapScreen"></canvas>

<div id="noteOverlay">
    <div style="background:white;padding:20px;">
        <h2>Note</h2>
        Press N to close
    </div>
</div>

<script>
window.addEventListener("DOMContentLoaded", () => {

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const mapCanvas = document.getElementById("mapScreen");
const mapCtx = mapCanvas.getContext("2d");

const noteOverlay = document.getElementById("noteOverlay");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    mapCanvas.width = window.innerWidth;
    mapCanvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let gameStarted = false;
let showMap = false;
let showNote = false;

const player = {
    x: 400,
    y: 300,
    size: 30,
    speed: 4,
    color: "blue"
};

// 🌊 River
const river = {
    get x() { return canvas.width / 2 - 50; },
    width: 100
};

// 🏡 Village (River → Village → Cave)
const village = {
    get x() { return river.x + river.width + 120; },
    y: 300,
    width: 120,
    height: 100
};

// 🕳️ Cave (right of village)
const cave = {
    get x() { return village.x + village.width + 80; },
    y: 280,
    width: 120,
    height: 100,
    get cx() { return this.x + this.width / 2; }
};

const keys = {};

function startGame(gender) {
    document.getElementById("menu").style.display = "none";
    player.color = gender === "male" ? "deepskyblue" : "hotpink";
    gameStarted = true;

    window.focus();
    loop();
}

// ✅ INPUT (fixed for Vercel)
window.addEventListener("keydown", (e) => {
    const key = e.key.toLowerCase();
    keys[key] = true;

    if (key === "m") {
        showMap = !showMap;
        mapCanvas.style.display = showMap ? "block" : "none";
        if (showMap) drawMap();
    }

    if (key === "n") {
        showNote = !showNote;
        noteOverlay.style.display = showNote ? "flex" : "none";
    }
});

window.addEventListener("keyup", (e) => {
    keys[e.key.toLowerCase()] = false;
});

function movePlayer() {
    if (showMap || showNote) return;

    if (keys["w"]) player.y -= player.speed;
    if (keys["s"]) player.y += player.speed;
    if (keys["a"]) player.x -= player.speed;
    if (keys["d"]) player.x += player.speed;

    player.x = Math.max(50, Math.min(canvas.width - 50, player.x));
    player.y = Math.max(50, Math.min(canvas.height - 50, player.y));
}

function drawWorld() {
    ctx.fillStyle = "#2d6a2d";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#3498db";
    ctx.fillRect(river.x, 0, river.width, canvas.height);

    // village
    ctx.fillStyle = "#c2a878";
    ctx.fillRect(village.x, village.y, village.width, village.height);

    // cave
    ctx.fillStyle = "#444";
    ctx.fillRect(cave.x, cave.y, cave.width, cave.height);

    // player
    ctx.fillStyle = player.color;
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.size/2, 0, Math.PI*2);
    ctx.fill();
}

function drawMap() {
    mapCtx.clearRect(0, 0, mapCanvas.width, mapCanvas.height);

    mapCtx.fillStyle = "green";
    mapCtx.fillRect(0, 0, mapCanvas.width, mapCanvas.height);

    mapCtx.fillStyle = "blue";
    mapCtx.fillRect(mapCanvas.width/2, 0, 40, mapCanvas.height);

    mapCtx.fillStyle = "yellow";
    mapCtx.fillRect(village.x/5, village.y/5, 30, 30);

    mapCtx.fillStyle = "gray";
    mapCtx.fillRect(cave.x/5, cave.y/5, 30, 30);

    mapCtx.fillStyle = "red";
    mapCtx.beginPath();
    mapCtx.arc(player.x/5, player.y/5, 5, 0, Math.PI*2);
    mapCtx.fill();
}

function loop() {
    if (!gameStarted) return;

    movePlayer();
    drawWorld();

    if (showMap) drawMap();

    requestAnimationFrame(loop);
}

});
</script>

</body>
</html>
